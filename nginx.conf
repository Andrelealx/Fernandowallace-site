worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        charset utf-8;

        # Bloqueia acesso a arquivos de configuracao/scripts
        location ~* \.(conf|yml|yaml|env|ps1|sh|md)$ {
            deny all;
            return 404;
        }

        # Bloqueia diretorios sensiveis
        location ~ ^/(\.git|\.claude|docs|midias|scripts|tunnel|memory)/ {
            deny all;
            return 404;
        }

        # Service Worker — sem cache para garantir atualizacoes
        location = /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Manifest — cache curto
        location = /manifest.json {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # CSS e JS — 30 dias
        location ~* \.(css|js)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Imagens e midia — 1 ano
        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|mp4)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Roteamento SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Pagina 404 customizada
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
