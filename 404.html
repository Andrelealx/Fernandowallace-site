<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Fernando Wallace</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B1F3A;
      color: #fff;
      font-family: 'Source Sans 3', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      color: #C9A646;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(255,255,255,.6);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: #1FA67A;
      color: #fff;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #178a64; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você procura não existe ou foi movida.<br>Volte para o início e explore o site.</p>
    <a href="/">← Voltar ao início</a>
  </div>
</body>
</html>
