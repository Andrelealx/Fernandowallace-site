<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem Conexão — Fernando Wallace</title>
  <style>
    :root {
      --navy: #0B1F3A;
      --navy-light: #132d52;
      --green: #1FA67A;
      --gold: #C9A646;
      --white: #FFFFFF;
      --muted: rgba(255,255,255,0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--navy);
      color: var(--white);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .card {
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      display: block;
      opacity: 0.75;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 0.75rem;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 1.75rem 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .name {
      color: var(--gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sem conexão com a internet</h1>
    <p>Não foi possível carregar o site de <span class="name">Fernando Wallace</span>. Verifique sua conexão e tente novamente.</p>
    <p>Páginas visitadas anteriormente podem estar disponíveis no cache do seu navegador.</p>
    <hr class="divider">
    <button class="btn" onclick="location.reload()">
      ↺ Tentar novamente
    </button>
    <p class="hint">
      fernandowallace.com.br
    </p>
  </div>
</body>
</html>
